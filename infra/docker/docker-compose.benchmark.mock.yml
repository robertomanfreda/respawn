services:
  respawn:
    build:
      context: ../..
      dockerfile: apps/gateway/Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      AUTH_DISABLED: "false"
      LOCAL_OPENAI_API_KEYS: local-dev-key:tenant-local,respawn-other-key:tenant-other
      DATABASE_URL: sqlite+aiosqlite:////tmp/respawn-mock.db
      MODEL_BACKEND: mock
      DEFAULT_MODEL: gpt-oss-120b
      VISION_MODEL: moondream
      MODEL_CAPABILITIES: gpt-oss-120b=text,file-text,reasoning,tools;moondream=text,file-text,vision
      BACKGROUND_JOB_TIMEOUT_SECONDS: "0.05"
      AUTO_CREATE_TABLES: "true"

  respawn-benchmark:
    image: python:3.12-slim
    profiles:
      - benchmark
    working_dir: /benchmark
    user: "${RESPAWN_BENCHMARK_UID:-1000}:${RESPAWN_BENCHMARK_GID:-1000}"
    environment:
      RESPAWN_BASE_URL: http://respawn:8080
      RESPAWN_API_KEY: ${RESPAWN_BENCHMARK_API_KEY:-local-dev-key}
      RESPAWN_SECONDARY_API_KEY: ${RESPAWN_BENCHMARK_SECONDARY_API_KEY:-respawn-other-key}
      RESPAWN_BENCHMARK_MODEL: gpt-oss-120b
      RESPAWN_BENCHMARK_TEXT_MODEL: gpt-oss-120b
      RESPAWN_BENCHMARK_VISION_MODEL: moondream
      RESPAWN_BENCHMARK_ASSET_BASE_URL: http://benchmark-assets:8000
      RESPAWN_BENCHMARK_MODEL_BACKEND: mock
      RESPAWN_BENCHMARK_OLLAMA_BASE_URL: ""
      RESPAWN_BENCHMARK_DATABASE_DRIVER: sqlite+aiosqlite
      RESPAWN_BENCHMARK_GIT_SHA: ${RESPAWN_BENCHMARK_GIT_SHA:-}
      RESPAWN_BENCHMARK_RUNS: ${RESPAWN_BENCHMARK_RUNS:-1}
      RESPAWN_BENCHMARK_TIMEOUT_SECONDS: ${RESPAWN_BENCHMARK_TIMEOUT_SECONDS:-180}
      RESPAWN_BENCHMARK_MAX_OUTPUT_TOKENS: ${RESPAWN_BENCHMARK_MAX_OUTPUT_TOKENS:-32}
      RESPAWN_BENCHMARK_EXPECT_OLLAMA_METRICS: "false"
      RESPAWN_BENCHMARK_INCLUDE_TAGS: ${RESPAWN_BENCHMARK_INCLUDE_TAGS:-}
      RESPAWN_BENCHMARK_EXCLUDE_TAGS: ${RESPAWN_BENCHMARK_EXCLUDE_TAGS:-}
      RESPAWN_BENCHMARK_COVERAGE_GATE: ${RESPAWN_BENCHMARK_COVERAGE_GATE:-true}
      RESPAWN_BENCHMARK_OUTPUT: ${RESPAWN_BENCHMARK_OUTPUT:-/results/respawn-benchmark-mock.json}
      RESPAWN_BENCHMARK_COMPARE_TO: ${RESPAWN_BENCHMARK_COMPARE_TO:-}
    command:
      - sh
      - -c
      - python -m pip install --no-cache-dir --target /tmp/respawn-benchmark-deps 'openai>=1.82' && PYTHONPATH=/tmp/respawn-benchmark-deps python /benchmark/respawn_benchmark.py
    volumes:
      - ./benchmark:/benchmark:ro
      - ./benchmark-results:/results
    depends_on:
      respawn:
        condition: service_started
      benchmark-assets:
        condition: service_started
    restart: "no"

  benchmark-assets:
    image: python:3.12-slim
    profiles:
      - benchmark
    working_dir: /assets
    command:
      - python
      - -m
      - http.server
      - "8000"
      - --bind
      - 0.0.0.0
    volumes:
      - ./benchmark/assets:/assets:ro
    restart: "no"
