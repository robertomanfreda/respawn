services:
  respawn:
    build:
      context: ../..
      dockerfile: apps/gateway/Dockerfile
    env_file:
      - env.example
      - path: env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://respawn:respawn@postgres:5432/respawn
      MODEL_BACKEND: ${MODEL_BACKEND:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-oss:120b}
      VISION_MODEL: ${VISION_MODEL:-moondream:latest}
      MODEL_CAPABILITIES: ${MODEL_CAPABILITIES:-gpt-oss:120b=text,file-text,reasoning,tools;moondream:latest=text,file-text,vision}
      CONTEXT_WINDOW_DEFAULT_TOKENS: ${CONTEXT_WINDOW_DEFAULT_TOKENS:-131072}
      MODEL_CONTEXT_WINDOWS: ${MODEL_CONTEXT_WINDOWS:-gpt-oss:120b=131072;gpt-oss-120b=131072;gpt-oss:20b=131072;gpt-oss-20b=131072;moondream:latest=4096}
      CONTEXT_TOKEN_MARGIN: ${CONTEXT_TOKEN_MARGIN:-256}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-false}
      WEB_SEARCH_BACKEND: ${WEB_SEARCH_BACKEND:-searxng}
      WEB_SEARCH_BASE_URL: ${WEB_SEARCH_BASE_URL:-http://searxng:8080}
      WEB_SEARCH_TIMEOUT_SECONDS: ${WEB_SEARCH_TIMEOUT_SECONDS:-10}
      WEB_SEARCH_MAX_RESULTS: ${WEB_SEARCH_MAX_RESULTS:-5}
      WEB_SEARCH_MAX_RESULT_CHARS: ${WEB_SEARCH_MAX_RESULT_CHARS:-12000}
      WEB_SEARCH_CACHE_TTL_SECONDS: ${WEB_SEARCH_CACHE_TTL_SECONDS:-3600}
      WEB_SEARCH_ALLOWED_DOMAINS: ${WEB_SEARCH_ALLOWED_DOMAINS:-}
      WEB_SEARCH_BLOCKED_DOMAINS: ${WEB_SEARCH_BLOCKED_DOMAINS:-}
      WEB_SEARCH_USER_AGENT: ${WEB_SEARCH_USER_AGENT:-RespawnWebSearch/1.0}
      IMAGE_GENERATION_ENABLED: ${IMAGE_GENERATION_ENABLED:-false}
      IMAGE_GENERATION_BACKEND: ${IMAGE_GENERATION_BACKEND:-comfyui}
      IMAGE_GENERATION_BASE_URL: ${IMAGE_GENERATION_BASE_URL:-http://comfyui:8188}
      IMAGE_GENERATION_MODEL: ${IMAGE_GENERATION_MODEL:-sd-v1-5.safetensors}
      IMAGE_GENERATION_TIMEOUT_SECONDS: ${IMAGE_GENERATION_TIMEOUT_SECONDS:-180}
      IMAGE_GENERATION_DEFAULT_SIZE: ${IMAGE_GENERATION_DEFAULT_SIZE:-512x512}
      IMAGE_GENERATION_MAX_PIXELS: ${IMAGE_GENERATION_MAX_PIXELS:-1048576}
      IMAGE_GENERATION_DEFAULT_STEPS: ${IMAGE_GENERATION_DEFAULT_STEPS:-8}
      IMAGE_GENERATION_MAX_STEPS: ${IMAGE_GENERATION_MAX_STEPS:-30}
      IMAGE_GENERATION_DEFAULT_CFG_SCALE: ${IMAGE_GENERATION_DEFAULT_CFG_SCALE:-7}
      IMAGE_GENERATION_SAMPLER: ${IMAGE_GENERATION_SAMPLER:-Euler a}
      IMAGE_GENERATION_NEGATIVE_PROMPT: ${IMAGE_GENERATION_NEGATIVE_PROMPT:-}
      IMAGE_GENERATION_OUTPUT_FORMAT: ${IMAGE_GENERATION_OUTPUT_FORMAT:-png}
      AUTO_CREATE_TABLES: "false"
    ports:
      - "8080:8080"
    depends_on:
      ollama-preload:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_MODELS_PATH:-ollama-data}:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-preload:
    image: curlimages/curl:latest
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_PRELOAD_MODEL: ${DEFAULT_MODEL:-gpt-oss:120b}
      OLLAMA_PRELOAD_MODELS: ${OLLAMA_PRELOAD_MODELS:-gpt-oss:120b,moondream:latest}
      OLLAMA_PRELOAD_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
    command:
      - sh
      - -c
      - |
        set -eu

        keep_alive="$$OLLAMA_PRELOAD_KEEP_ALIVE"
        if printf '%s' "$$keep_alive" | grep -Eq '^-?[0-9]+$$'; then
          keep_alive_json="$$keep_alive"
        else
          escaped_keep_alive=$$(printf '%s' "$$keep_alive" | sed 's/\\/\\\\/g; s/"/\\"/g')
          keep_alive_json="\"$$escaped_keep_alive\""
        fi

        models="$${OLLAMA_PRELOAD_MODELS:-$$OLLAMA_PRELOAD_MODEL}"
        old_ifs="$$IFS"
        IFS=","
        for model in $$models; do
          IFS="$$old_ifs"
          model=$$(printf '%s' "$$model" | sed 's/^ *//; s/ *$$//')
          if [ -z "$$model" ]; then
            IFS=","
            continue
          fi
          escaped_model=$$(printf '%s' "$$model" | sed 's/\\/\\\\/g; s/"/\\"/g')
          payload=$$(printf '{"model":"%s","prompt":"","keep_alive":%s}' "$$escaped_model" "$$keep_alive_json")
          pull_payload=$$(printf '{"name":"%s","stream":false}' "$$escaped_model")

          echo "Preloading Ollama model $$model with keep_alive=$$keep_alive..."
          if ! curl -fsS "$$OLLAMA_URL/api/generate" \
            -H "Content-Type: application/json" \
            -d "$$payload" >/dev/null; then
            echo "Model $$model is not ready; pulling it from Ollama registry..."
            curl -fsS "$$OLLAMA_URL/api/pull" \
              -H "Content-Type: application/json" \
              -d "$$pull_payload" >/dev/null
            curl -fsS "$$OLLAMA_URL/api/generate" \
              -H "Content-Type: application/json" \
              -d "$$payload" >/dev/null
          fi
          echo "Ollama model $$model is loaded."
          IFS=","
        done
        IFS="$$old_ifs"
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: respawn
      POSTGRES_PASSWORD: respawn
      POSTGRES_DB: respawn
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U respawn"]
      interval: 5s
      timeout: 5s
      retries: 10

  searxng:
    image: searxng/searxng:latest
    profiles:
      - web-search
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8081/}
    ports:
      - "${SEARXNG_PORT:-8081}:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  comfyui:
    build:
      context: ../..
      dockerfile: infra/docker/comfyui/Dockerfile
      args:
        COMFYUI_REPOSITORY: ${COMFYUI_REPOSITORY:-https://github.com/Comfy-Org/ComfyUI.git}
        COMFYUI_REF: ${COMFYUI_REF:-master}
    profiles:
      - image-generation
    environment:
      COMFYUI_ARGS: ${COMFYUI_ARGS:---disable-api-nodes --disable-pinned-memory --force-fp16 --fp16-vae --fp16-text-enc --dont-upcast-attention}
      COMFYUI_BASE_DIRECTORY: ${COMFYUI_BASE_DIRECTORY:-/data}
      COMFYUI_DATABASE_URL: ${COMFYUI_DATABASE_URL:-}
      COMFYUI_LISTEN: ${COMFYUI_LISTEN:-0.0.0.0}
      COMFYUI_PORT: ${COMFYUI_PORT:-8188}
    ports:
      - "${COMFYUI_PORT_HOST:-8188}:8188"
    volumes:
      - ${COMFYUI_DATA_PATH:-comfyui-data}:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8188/system_stats >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=${VICTORIA_RETENTION_PERIOD:-1}
      - -promscrape.config=/etc/victoria/promscrape.yml
    ports:
      - "${VICTORIA_METRICS_PORT:-8428}:8428"
    volumes:
      - victoria-metrics-data:/victoria-metrics-data
      - ./observability/victoria/promscrape.yml:/etc/victoria/promscrape.yml:ro
    depends_on:
      respawn:
        condition: service_started

  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-respawn}
      GF_USERS_DEFAULT_THEME: dark
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_METRICS_ENABLED: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      victoria-metrics:
        condition: service_started

volumes:
  ollama-data:
  comfyui-data:
  victoria-metrics-data:
  grafana-data:
