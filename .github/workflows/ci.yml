name: CI

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

jobs:
  gateway-tests:
    name: Gateway tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/gateway

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/gateway/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest

  release:
    name: Release Respawn
    runs-on: ubuntu-latest
    needs: gateway-tests
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    permissions:
      contents: write

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read Respawn version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("apps/gateway/pyproject.toml").read_text())
          print(f"version={pyproject['project']['version']}")
          PY

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          tag="v${RELEASE_VERSION}"
          release_sha="${RELEASE_SHA:-}"
          if [ -z "$release_sha" ] || [ "$release_sha" = "null" ]; then
            release_sha="$(git rev-parse HEAD)"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag" "$release_sha"
            git push origin "$tag"
          fi

          gh release create "$tag" \
            --title "Respawn ${RELEASE_VERSION}" \
            --notes "Release generated from merged pull request #${PR_NUMBER}."
